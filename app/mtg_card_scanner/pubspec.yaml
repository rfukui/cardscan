name: mtg_card_scanner
description: "A local Magic: The Gathering card scanner MVP built with Flutter."
publish_to: none
version: 0.1.0+1
environment:
  sdk: ">=2.18.0 <4.0.0"
dependencies:
  flutter:
    sdk: flutter
  camera: ^0.10.0
  google_mlkit_text_recognition: ^0.7.0
  sqflite: ^2.2.8
  path_provider: ^2.0.15
  path: ^1.8.4
  image: ^4.1.31
  flutter_riverpod: ^2.4.0
  collection: ^1.19.1
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
flutter:
  uses-material-design: true
  assets:
    - assets/database/mtg_cards.sqlite
